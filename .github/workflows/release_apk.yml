name: Build & Release APK

on:
  # Trigger on version tags like v1.0.0, v2.1.3, etc.
  push:
    tags:
      - 'v*'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes for this build'
        required: false
        default: 'New release build'

# Cancel in-progress runs for the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    
    steps:
      # ─── 1. Checkout Code ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Setup Java (required for Android build) ────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # ─── 3. Setup Flutter ──────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          cache: true

      # ─── 4. Install Dependencies ───────────────────────────────────────
      - name: Get Flutter dependencies
        run: flutter pub get

      # ─── 5. Run Analyzer ───────────────────────────────────────────────
      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      # ─── 6. Decode Keystore (from GitHub Secrets) ──────────────────────
      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release-keystore.jks

      # ─── 7. Create key.properties ──────────────────────────────────────
      - name: Create key.properties
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > android/key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release-keystore.jks
          EOF

      # ─── 8. Build Release APK ─────────────────────────────────────────
      - name: Build Release APK
        run: flutter build apk --release --split-per-abi

      # ─── 9. Build Fat APK (universal) ──────────────────────────────────
      - name: Build Universal APK
        run: flutter build apk --release

      # ─── 10. Upload APK as Artifact ────────────────────────────────────
      - name: Upload APKs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # ─── 11. Get version from tag ──────────────────────────────────────
      - name: Get version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      # ─── 12. Create GitHub Release ─────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: PocketLedger ${{ steps.version.outputs.VERSION }}
          body: |
            ## 📦 PocketLedger ${{ steps.version.outputs.VERSION }}
            
            ### Downloads
            - **`app-arm64-v8a-release.apk`** — For most modern phones (ARM 64-bit)
            - **`app-armeabi-v7a-release.apk`** — For older phones (ARM 32-bit)
            - **`app-release.apk`** — Universal (works on all devices, larger size)
            
            ### What's New
            ${{ github.event.inputs.release_notes || 'See commit history for changes.' }}
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
