name: Build & Release APK

on:
  # Trigger on version tags like v1.0.0, v2.1.3, etc.
  push:
    tags:
      - 'v*'
    branches:
      - 'master'
      - 'main'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes for this build'
        required: false
        default: 'New release build'

# Cancel in-progress runs for the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    
    steps:
      # ─── 1. Checkout Code ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─── 2. Setup Java (required for Android build) ────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # ─── 3. Setup Flutter ──────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          cache: true

      # ─── 4. Install Dependencies ───────────────────────────────────────
      - name: Get Flutter dependencies
        run: flutter pub get

      # ─── 5. Run Analyzer ───────────────────────────────────────────────
      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      # ─── 6. Build Release APK ─────────────────────────────────────────
      - name: Build Release APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          # Only try to build signed if we have the secrets
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release-keystore.jks
            echo "storePassword=$STORE_PASSWORD" > android/key.properties
            echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
            echo "keyAlias=$KEY_ALIAS" >> android/key.properties
            echo "storeFile=release-keystore.jks" >> android/key.properties
          fi
          flutter build apk --release --split-per-abi
          flutter build apk --release

      # ─── 7. Extract Version ───────────────────────────────────────────
      - name: Extract project version
        id: get_version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | awk '{print $2}' | tr -d '\r')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          
          # Use tag if available, otherwise use version from pubspec
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
          else
            TAG_NAME="v$VERSION-build-${{ github.run_number }}"
          fi
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT

      # ─── 8. Create GitHub Release ─────────────────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.TAG_NAME }}
          name: Bhawuk's Kharcha ${{ steps.get_version.outputs.TAG_NAME }}
          body: |
            ## 🚀 Bhawuk's Kharcha - Performance & Personality 🔥
            
            **Version:** `${{ steps.get_version.outputs.VERSION }}`
            **Build Number:** `${{ github.run_number }}`
            
            ### Downloads
            - **`app-arm64-v8a-release.apk`** — Modern phones (Fastest)
            - **`app-armeabi-v7a-release.apk`** — Older phones
            - **`app-release.apk`** — Universal build (Compatible everywhere)
            
            ### What's New
            ${{ github.event.inputs.release_notes || 'Automatic build from pipeline.' }}
            
            ---
            *Oye! Hissab-kitab rakho, Bhawuk da style vich!* 🫡
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── 9. Upload Artifacts (Back-up) ─────────────────────────────────
      - name: Upload APKs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7
